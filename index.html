<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koleksi Dr. Pinguin Bokep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .video-card { transition: all 0.2s ease; }
        .video-card:hover { transform: translateY(-4px); }
        .grid-videos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }
        @media (min-width: 640px) {
            .grid-videos { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 14px; }
        }
        @media (min-width: 1024px) {
            .grid-videos { grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 bg-zinc-950 border-b border-zinc-800">
        <div class="max-w-screen-2xl mx-auto px-5 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-cyan-400 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-penguin text-zinc-950 text-2xl"></i>
                </div>
                <div>
                    <span class="font-semibold text-xl tracking-tight">Dr. Pinguin</span>
                    <span class="text-xs text-zinc-500 block -mt-1">Bokep Collection</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-5 pt-8 pb-5">
        <h1 class="text-3xl font-bold tracking-tighter">Koleksi Video</h1>
        <p class="text-zinc-400 mt-1">Total <span id="total-count" class="font-semibold text-white">0</span> video</p>
    </div>

    <!-- Search -->
    <div class="max-w-screen-2xl mx-auto px-5 pb-6">
        <input type="text" id="search-input" placeholder="Cari judul video..." 
               class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:border-cyan-400 outline-none">
        
        <div id="category-filter" class="flex flex-wrap gap-2 mt-4"></div>
    </div>

    <!-- Video Grid -->
    <div class="max-w-screen-2xl mx-auto px-5 pb-12">
        <div id="video-grid" class="grid-videos"></div>
    </div>

    <!-- Modal -->
    <div id="modal" onclick="if (event.target.id === 'modal') closeModal()" 
         class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 w-full max-w-4xl rounded-3xl overflow-hidden border border-zinc-700">
            
            <div class="px-5 py-4 flex justify-between items-center border-b border-zinc-700">
                <div>
                    <h3 id="modal-title" class="font-semibold"></h3>
                    <p id="modal-category" class="text-sm text-cyan-400"></p>
                </div>
                <button onclick="closeModal()" class="text-2xl px-2">×</button>
            </div>

            <div class="aspect-video bg-black">
                <iframe id="modal-iframe" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
            </div>

            <div class="p-4 bg-zinc-950 flex justify-end">
                <button onclick="shareToWhatsApp()" 
                        class="flex items-center gap-x-2 px-5 py-2.5 bg-green-600 hover:bg-green-500 rounded-2xl text-sm text-white">
                    <i class="fa-brands fa-whatsapp"></i>
                    <span>Share ke WhatsApp</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        let allVideos = [];
        let filteredVideos = [];
        let currentVideo = null;

        async function loadVideos() {
            try {
                const res = await fetch('videos.json');
                allVideos = await res.json();
                filteredVideos = [...allVideos];

                renderVideos();
                renderCategoryFilter();
                document.getElementById('total-count').textContent = allVideos.length;
            } catch (err) {
                console.error(err);
                alert('Gagal memuat videos.json');
            }
        }

        function renderVideos() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = '';

            filteredVideos.forEach(video => {
                const card = document.createElement('div');
                card.className = `video-card bg-zinc-900 border border-zinc-700 rounded-3xl overflow-hidden cursor-pointer`;

                card.innerHTML = `
                    <div class="relative">
                        <img src="https://picsum.photos/id/1011/400/225" class="w-full aspect-video object-cover">
                        <div class="absolute top-2 left-2">
                            <span class="px-2.5 py-1 text-xs bg-black/70 rounded-2xl">${video.category}</span>
                        </div>
                    </div>
                    <div class="p-3">
                        <h4 class="font-medium text-sm line-clamp-3">${video.title}</h4>
                    </div>
                `;

                card.onclick = () => openModal(video);
                grid.appendChild(card);
            });
        }

        function renderCategoryFilter() {
            const container = document.getElementById('category-filter');
            const categories = [...new Set(allVideos.map(v => v.category))];
            
            container.innerHTML = `<button onclick="filterByCategory('all')" class="px-4 py-1.5 text-sm rounded-2xl bg-cyan-400 text-black">Semua</button>`;
            
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-1.5 text-sm rounded-2xl bg-zinc-800 hover:bg-zinc-700`;
                btn.textContent = cat;
                btn.onclick = () => filterByCategory(cat);
                container.appendChild(btn);
            });
        }

        function filterByCategory(category) {
            if (category === 'all') {
                filteredVideos = [...allVideos];
            } else {
                filteredVideos = allVideos.filter(v => v.category === category);
            }
            renderVideos();
        }

        function openModal(video) {
            currentVideo = video;
            document.getElementById('modal-title').textContent = video.title;
            document.getElementById('modal-category').textContent = video.category || 'Umum';
            document.getElementById('modal-iframe').src = video.embed;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('modal-iframe').src = '';
            document.getElementById('modal').classList.remove('flex');
            document.getElementById('modal').classList.add('hidden');
        }

        function shareToWhatsApp() {
            if (!currentVideo) return;
            const text = `Tonton video ini:\n${currentVideo.title}\n\nhttps://koleksi-dr-pinguin-bokep.vercel.app`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        // Search
        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            filteredVideos = allVideos.filter(v => 
                v.title.toLowerCase().includes(term) || 
                (v.category && v.category.toLowerCase().includes(term))
            );
            renderVideos();
        });

        window.onload = loadVideos;
    </script>
</body>
</html>
