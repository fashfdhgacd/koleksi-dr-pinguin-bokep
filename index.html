<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Vercel Analytics -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Pinguin Bokep, M.S.B.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Poppins', system_ui, sans-serif; font-weight: 700; letter-spacing: -1px; }
        
        .video-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            border: 1px solid #27272a;
        }
        .video-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            border-color: #3f3f46;
        }
        
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            overflow: hidden;
            border-radius: 20px;
            border: 1px solid #3f3f46;
            box-shadow: 
                inset 0 2px 4px 0 rgb(0 0 0 / 0.4),
                0 4px 6px -1px rgb(0 0 0 / 0.3);
        }
        
        .video-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.02), transparent 30%);
            pointer-events: none;
            z-index: 1;
            border-radius: 20px;
        }
        
        .video-wrapper iframe {
            width: 100% !important;
            height: 100% !important;
            border: none;
            display: block;
            border-radius: 20px;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <!-- Feature Flags Script -->
    <script type="module">
      import { getFeatureFlags } from './flags.js';

      async function initFeatureFlags() {
        const flags = await getFeatureFlags();
        console.log('%c[Feature Flags]', 'color:#22c55e', flags);

        if (!flags.showLiveCategory) {
          const liveFilter = document.querySelector('[data-category="Live"]');
          if (liveFilter) liveFilter.style.display = 'none';
        }

        if (flags.maintenanceMode) {
          document.body.innerHTML = `
            <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;">
              <div style="text-align:center;">
                <h1 style="font-size:2rem;margin-bottom:1rem;">🔧 Maintenance</h1>
                <p>Koleksi sedang dalam perbaikan. Coba lagi nanti.</p>
              </div>
            </div>
          `;
        }
      }

      initFeatureFlags();
    </script>

    <div class="max-w-7xl mx-auto px-4 py-6 md:px-8">
        
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4 pb-6 border-b border-zinc-800">
            <div class="flex items-center gap-x-4">
                <img src="logo.png" class="w-14 h-14 rounded-full border-2 border-yellow-400" alt="Dr. Pinguin"
                     onerror="this.src='https://i.postimg.cc/mrNxt4m5/6307559168587534411.jpg'">
                <div>
                    <div class="flex items-baseline gap-x-2">
                        <span class="logo-font text-3xl md:text-4xl font-black text-yellow-400">Dr. Pinguin</span>
                        <span class="logo-font text-3xl md:text-4xl font-black text-white">Bokep</span>
                    </div>
                    <div class="text-[10px] text-yellow-400/70 tracking-[2px] mt-1.5">M.S.B. • KOLEKSI PILIHAN</div>
                </div>
            </div>
            
            <div class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-2 text-sm flex items-center gap-2">
                <span id="total" class="font-bold text-yellow-400 text-xl">0</span>
                <span class="text-zinc-400 text-sm">video tersedia</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex flex-col lg:flex-row gap-3 mb-6">
            <div class="flex-1 relative">
                <i class="fas fa-search absolute left-5 top-4 text-zinc-500"></i>
                <input id="search" type="text" placeholder="Cari judul video..." 
                       class="w-full bg-zinc-900 border border-zinc-700 focus:border-yellow-400 rounded-3xl pl-12 pr-6 py-3.5 text-base outline-none">
            </div>
            
            <select id="sort" class="bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-3.5 text-base">
                <option value="newest">Terbaru</option>
                <option value="oldest">Terlama</option>
                <option value="az">A - Z</option>
                <option value="za">Z - A</option>
            </select>
        </div>

        <!-- Category Filter -->
        <div class="mb-6 max-w-xs">
            <label class="block text-xs uppercase tracking-widest text-zinc-500 font-semibold mb-1.5 px-1">Kategori</label>
            <select id="category-select" class="w-full bg-zinc-900 border border-zinc-700 focus:border-yellow-400 rounded-3xl px-5 py-3 text-base outline-none">
                <!-- Options populated by JS -->
            </select>
        </div>

        <!-- Video Grid -->
        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-5"></div>

        <!-- Pagination -->
        <div class="flex flex-col sm:flex-row items-center justify-between mt-10 gap-4 text-sm text-zinc-400">
            <div id="pagination-info"></div>
            <div class="flex gap-2" id="pagination-controls"></div>
        </div>
    </div>

    <script>
        // ... (script JS tetap sama persis seperti sebelumnya)
        let videos = [];
        let activeCategory = 'all';
        let currentPage = 1;
        const perPage = 16;

        async function loadVideos() {
            try {
                const res = await fetch('videos.json');
                videos = await res.json();

                videos.forEach(v => {
                    if (v.title) v.title = v.title.replace(/^[\u25B6\uFE0F\s]*/, '').trim();
                });

                document.getElementById('total').textContent = videos.length;
                setupCategoryDropdown();
                render();
            } catch(err) {
                document.getElementById('grid').innerHTML = `
                    <div class="col-span-full py-12 text-center">
                        <p class="text-zinc-400">Gagal memuat videos.json</p>
                    </div>
                `;
            }
        }

        function setupCategoryDropdown() {
            const select = document.getElementById('category-select');
            if (!select) return;

            select.innerHTML = '';

            const categories = [...new Set(videos.map(v => v.category).filter(Boolean))].sort();

            const allOption = document.createElement('option');
            allOption.value = 'all';
            allOption.textContent = 'Semua Kategori';
            select.appendChild(allOption);

            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                select.appendChild(option);
            });

            select.addEventListener('change', () => {
                activeCategory = select.value;
                currentPage = 1;
                render();
            });
        }

        function render() {
            const grid = document.getElementById('grid');
            const searchTerm = document.getElementById('search').value.toLowerCase().trim();
            const sortMode = document.getElementById('sort').value;

            let filtered = videos.filter(v => {
                const matchSearch = !searchTerm || (v.title && v.title.toLowerCase().includes(searchTerm));
                const matchCat = activeCategory === 'all' || v.category === activeCategory;
                return matchSearch && matchCat;
            });

            if (sortMode === 'newest') filtered.sort((a,b) => (b.id||0) - (a.id||0));
            else if (sortMode === 'oldest') filtered.sort((a,b) => (a.id||0) - (b.id||0));
            else if (sortMode === 'az') filtered.sort((a,b) => (a.title||'').localeCompare(b.title||''));
            else if (sortMode === 'za') filtered.sort((a,b) => (b.title||'').localeCompare(a.title||''));

            const totalPages = Math.ceil(filtered.length / perPage);
            if (currentPage > totalPages) currentPage = totalPages || 1;

            const start = (currentPage - 1) * perPage;
            const pageVideos = filtered.slice(start, start + perPage);

            if (pageVideos.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-10 text-zinc-400">Tidak ada video</div>`;
                updatePagination(0, 0);
                return;
            }

            grid.innerHTML = pageVideos.map((v, i) => {
                const hasDirect = v.direct && v.direct.trim() !== '';
                const globalNum = start + i + 1;

                return `
                    <div class="video-card bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">
                        <!-- Top bar -->
                        <div class="px-4 pt-3.5 pb-2.5 flex items-center justify-between bg-zinc-950/60">
                            <span class="px-3 py-0.5 text-xs font-bold rounded-full bg-yellow-400 text-black">${v.category || 'Umum'}</span>
                            <span class="text-[10px] text-zinc-500 font-mono">#${globalNum}</span>
                        </div>

                        <!-- VIDEO PLAYER (sudah diperbaiki) -->
                        <div class="video-wrapper">
                            <iframe src="${v.embed}" loading="lazy" allowfullscreen></iframe>
                        </div>

                        <!-- Title -->
                        <div class="px-4 pt-4 pb-1">
                            <div class="text-sm font-medium leading-snug line-clamp-2 min-h-[40px]">
                                ${v.title || 'Untitled Video'}
                            </div>
                        </div>

                        <!-- Source + Button -->
                        <div class="px-4 pb-4 pt-2 flex items-center justify-between gap-3">
                            <span class="text-xs text-zinc-400 truncate max-w-[45%]">${v.source || ''}</span>
                            
                            <a href="${hasDirect ? v.direct : (v.embed || '#')}" target="_blank"
                               class="text-xs px-4 py-2 rounded-2xl bg-emerald-600 hover:bg-emerald-700 text-white font-semibold flex items-center gap-2 transition whitespace-nowrap">
                                <i class="fas fa-external-link-alt text-xs"></i>
                                <span>TONTON LANGSUNG</span>
                            </a>
                        </div>
                    </div>
                `;
            }).join('');

            updatePagination(filtered.length, totalPages);
        }

        function updatePagination(total, totalPages) {
            const info = document.getElementById('pagination-info');
            const controls = document.getElementById('pagination-controls');
            
            info.innerHTML = `Menampilkan <span class="text-white font-semibold">${total}</span> video`;
            controls.innerHTML = '';

            if (totalPages <= 1) return;

            const createPageBtn = (pageNum, isActive = false) => {
                const btn = document.createElement('button');
                btn.textContent = pageNum;
                btn.className = `px-3.5 py-2 text-sm rounded-2xl border transition min-w-[42px] ${isActive 
                    ? 'bg-yellow-400 text-black border-yellow-400 font-semibold' 
                    : 'border-zinc-700 hover:bg-zinc-800 hover:text-white'}`;
                btn.onclick = () => {
                    if (currentPage !== pageNum) {
                        currentPage = pageNum;
                        render();
                    }
                };
                return btn;
            };

            const prev = document.createElement('button');
            prev.innerHTML = `<i class="fas fa-chevron-left"></i>`;
            prev.className = `px-3.5 py-2 text-sm rounded-2xl border flex items-center transition ${currentPage === 1 ? 'border-zinc-800 text-zinc-600 cursor-not-allowed' : 'border-zinc-700 hover:bg-yellow-400 hover:text-black'}`;
            prev.onclick = () => { if (currentPage > 1) { currentPage--; render(); } };
            controls.appendChild(prev);

            const maxVisible = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
            let endPage = Math.min(totalPages, startPage + maxVisible - 1);

            if (endPage - startPage < maxVisible - 1) {
                startPage = Math.max(1, endPage - maxVisible + 1);
            }

            if (startPage > 1) {
                controls.appendChild(createPageBtn(1));
                if (startPage > 2) {
                    const ellipsis = document.createElement('span');
                    ellipsis.textContent = '...';
                    ellipsis.className = 'px-2 py-2 text-zinc-500';
                    controls.appendChild(ellipsis);
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                controls.appendChild(createPageBtn(i, i === currentPage));
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    const ellipsis = document.createElement('span');
                    ellipsis.textContent = '...';
                    ellipsis.className = 'px-2 py-2 text-zinc-500';
                    controls.appendChild(ellipsis);
                }
                controls.appendChild(createPageBtn(totalPages));
            }

            const next = document.createElement('button');
            next.innerHTML = `<i class="fas fa-chevron-right"></i>`;
            next.className = `px-3.5 py-2 text-sm rounded-2xl border flex items-center transition ${currentPage === totalPages ? 'border-zinc-800 text-zinc-600 cursor-not-allowed' : 'border-zinc-700 hover:bg-yellow-400 hover:text-black'}`;
            next.onclick = () => { if (currentPage < totalPages) { currentPage++; render(); } };
            controls.appendChild(next);
        }

        document.getElementById('search').addEventListener('input', () => { currentPage = 1; render(); });
        document.getElementById('sort').addEventListener('change', () => { currentPage = 1; render(); });

        loadVideos();
    </script>
</body>
</html>
