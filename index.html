<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koleksi Dr. Pinguin Bokep • Gallery</title>
<style>
/* ========== Card Style (dari kamu) ========== */
.vg-wrap {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.vg-card {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
}
.vg-top {
  padding: 10px 14px;
  background: #f8fafc;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #e2e8f0;
}
.vg-pill {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 999px;
  background: #dbeafe;
  color: #1e40af;
}
.vg-num {
  font-size: 11px;
  color: #64748b;
  font-family: ui-monospace, monospace;
  font-weight: 600;
}
.vg-title {
  padding: 11px 14px;
  font-size: 13px;
  color: #475569;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  border-bottom: 1px solid #e2e8f0;
  word-break: break-all;
  min-height: 42px;
  line-height: 1.4;
}
.vg-video {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #0f172a;
  overflow: hidden;
}
.vg-video iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
}
.vg-footer {
  display: flex;
  gap: 8px;
  padding: 12px 14px;
  background: #fafafa;
}
.vg-btn {
  flex: 1;
  font-size: 12px;
  padding: 9px 0;
  border-radius: 6px;
  border: 1px solid #d1d5db;
  background: #fff;
  color: #374151;
  font-family: ui-monospace, monospace;
  font-weight: 600;
  text-align: center;
  text-decoration: none;
  display: block;
}
.vg-btn.protected {
  background: #166534;
  color: #fff;
  border-color: #166534;
}

/* ========== Home Page Style ========== */
body {
  margin: 0;
  background: #f8fafc;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  color: #1e2937;
}
.navbar {
  background: white;
  border-bottom: 1px solid #e2e8f0;
  padding: 16px 24px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.navbar-content {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.logo {
  font-size: 20px;
  font-weight: 700;
  color: #166534;
  text-decoration: none;
}
.search-box input {
  padding: 10px 18px;
  border: 1px solid #cbd5e1;
  border-radius: 999px;
  width: 300px;
  font-size: 14px;
}
#total-count {
  background: #166534;
  color: white;
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
}
.hero {
  background: linear-gradient(135deg, #166534, #14532d);
  color: white;
  padding: 70px 24px;
  text-align: center;
}
.hero h1 {
  font-size: 38px;
  margin: 0 0 10px;
}
.hero p {
  font-size: 17px;
  opacity: 0.9;
  max-width: 480px;
  margin: 0 auto;
}
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 40px 24px;
}
.section-title {
  font-size: 22px;
  margin-bottom: 20px;
  font-weight: 700;
}
.empty-state {
  text-align: center;
  padding: 70px 20px;
  background: white;
  border: 2px dashed #cbd5e1;
  border-radius: 16px;
}
#pagination {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 30px;
  flex-wrap: wrap;
}
.page-btn {
  font-family: ui-monospace, monospace;
  font-size: 14px;
  padding: 9px 15px;
  border: 1px solid #d1d5db;
  background: white;
  border-radius: 8px;
  cursor: pointer;
}
.page-btn.active {
  background: #166534;
  color: white;
  border-color: #166534;
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="navbar-content">
    <a href="#" class="logo">🐧 Koleksi Dr. Pinguin Bokep</a>
    <div class="search-box">
      <input type="text" id="search" placeholder="Cari judul video...">
      <span id="total-count">0 video</span>
    </div>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Koleksi Dr. Pinguin Bokep</h1>
  <p>Gallery video yang rapi. Tinggal tambah video dari converter kamu.</p>
</div>

<!-- GALLERY -->
<div class="container">
  <div class="section-title">Semua Video</div>

  <!-- 
    CARA ISI:
    1. Copy card HTML dari converter kamu
    2. Paste di dalam <div id="gallery"> di bawah ini
    3. Otomatis terbagi per halaman
  -->

  <div class="vg-wrap" id="gallery">
    <!-- KOSONG - ISI DENGAN CONVERTER KAMU -->
  </div>

  <div id="pagination"></div>
</div>

<script>
// ==================== SCRIPT PAGINATION + SEARCH ====================
const itemsPerPage = 10;

function initGallery() {
  const gallery = document.getElementById('gallery');
  const searchInput = document.getElementById('search');
  const pagination = document.getElementById('pagination');
  const countEl = document.getElementById('total-count');

  function getCards() {
    return Array.from(gallery.querySelectorAll('.vg-card'));
  }

  function showPage(page) {
    const cards = getCards();
    const totalPages = Math.ceil(cards.length / itemsPerPage);
    const start = (page - 1) * itemsPerPage;
    const end = start + itemsPerPage;

    cards.forEach((card, i) => {
      card.style.display = (i >= start && i < end) ? '' : 'none';
    });

    countEl.textContent = `${cards.length} video`;
    renderPagination(totalPages, page);
  }

  function renderPagination(totalPages, current) {
    pagination.innerHTML = '';
    if (totalPages <= 1) return;

    for (let i = 1; i <= totalPages; i++) {
      const btn = document.createElement('button');
      btn.textContent = i;
      btn.className = 'page-btn';
      if (i === current) btn.classList.add('active');
      btn.onclick = () => showPage(i);
      pagination.appendChild(btn);
    }
  }

  // Search
  searchInput.addEventListener('input', () => {
    const keyword = searchInput.value.toLowerCase();
    const cards = getCards();

    cards.forEach(card => {
      const title = card.querySelector('.vg-title').textContent.toLowerCase();
      card.style.display = title.includes(keyword) ? '' : 'none';
    });
    showPage(1);
  });

  // Cek kalau masih kosong
  setTimeout(() => {
    const cards = getCards();
    if (cards.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = `
        <h3 style="margin:0 0 8px 0;">Gallery masih kosong</h3>
        <p style="margin:0;color:#64748b;">Paste card video dari converter kamu di dalam div#gallery</p>
      `;
      gallery.appendChild(empty);
    } else {
      showPage(1);
    }
  }, 100);
}

initGallery();
</script>

</body>
</html>
