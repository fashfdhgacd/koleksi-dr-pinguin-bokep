<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Harimau Bokep • Koleksi Premium</title>
    
    <!-- Vercel Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Poppins:wght@600;700&amp;display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .logo-font {
            font-family: 'Poppins', system_ui, sans-serif;
            font-weight: 700;
            letter-spacing: -0.04em;
        }

        .premium-gradient {
            background: linear-gradient(135deg, #18181b 0%, #27251f 100%);
        }

        .video-card {
            transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            background: #18181b;
        }
        
        .video-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
            border-color: #e11d48;
        }

        .video-wrapper {
            aspect-ratio: 16 / 9;
            background: #000;
            overflow: hidden;
            position: relative;
        }
        
        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .section-header {
            font-size: 2.1rem;
            line-height: 1.1;
            font-weight: 700;
            letter-spacing: -0.04em;
        }

        .exclusive-badge {
            background: linear-gradient(to right, #e11d48, #be123c);
            box-shadow: 0 0 15px rgba(225, 29, 72, 0.4);
        }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    
    <!-- Top Bar -->
    <div class="bg-zinc-900 border-b border-zinc-800 py-2.5">
        <div class="max-w-7xl mx-auto px-6 flex items-center justify-between text-xs">
            <div class="flex items-center gap-x-2 text-emerald-400">
                <i class="fa-solid fa-check-circle"></i>
                <span class="font-medium">10.240+ Video • Update Harian</span>
            </div>
            <div class="hidden md:block text-zinc-400">
                Optimized untuk HP, Tablet &amp; Desktop
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 pt-8 pb-12">
        
        <!-- Premium Header -->
        <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-y-4 mb-10">
            <div>
                <div class="flex items-center gap-x-3 mb-3">
                    <div class="w-12 h-12 bg-gradient-to-br from-rose-600 to-red-700 rounded-2xl flex items-center justify-center shadow-inner">
                        <i class="fa-solid fa-play text-white text-2xl ml-0.5"></i>
                    </div>
                    <div>
                        <span class="logo-font text-5xl font-black tracking-tighter">Dr. Harimau</span>
                        <span class="logo-font text-5xl font-black tracking-tighter text-rose-500">Bokep</span>
                    </div>
                </div>
                
                <div class="flex items-center gap-x-3">
                    <h1 class="section-header">Koleksi Premium</h1>
                    <div class="exclusive-badge text-white text-xs font-bold px-5 py-1.5 rounded-3xl flex items-center gap-x-1.5 shadow-lg">
                        <i class="fa-solid fa-fire"></i>
                        <span>EXCLUSIVE</span>
                    </div>
                </div>
                <p class="text-xl text-zinc-400 mt-1">Collection Dr. Harimau Bokep, S. M. Sc.</p>
            </div>

            <div class="bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-3 flex items-center gap-x-4">
                <div class="text-center">
                    <div id="total" class="font-bold text-3xl text-rose-400">0</div>
                    <div class="text-[10px] text-zinc-400 -mt-1">VIDEO</div>
                </div>
                <div class="w-px h-9 bg-zinc-700"></div>
                <div>
                    <div class="text-emerald-400 text-xs font-semibold tracking-wider">PREMIUM COLLECTION</div>
                    <div class="text-xs text-zinc-400">Ribuan konten pilihan</div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex flex-col lg:flex-row gap-4 mb-8">
            
            <!-- Search -->
            <div class="flex-1 relative group">
                <i class="fa-solid fa-search absolute left-5 top-[17px] text-zinc-500 group-focus-within:text-rose-400 transition-colors"></i>
                <input id="search" type="text" placeholder="Cari judul video (contoh: kluar dalem, AI, cosplayer)..." 
                       class="w-full bg-zinc-900 border border-zinc-700 focus:border-rose-500 transition-colors rounded-3xl pl-12 pr-6 py-4 text-base outline-none">
            </div>
            
            <!-- Sort -->
            <div class="flex gap-3">
                <select id="sort" class="bg-zinc-900 border border-zinc-700 focus:border-rose-500 transition-colors rounded-3xl px-6 py-4 text-base min-w-[160px]">
                    <option value="newest">Terbaru</option>
                    <option value="oldest">Terlama</option>
                    <option value="az">A - Z</option>
                    <option value="za">Z - A</option>
                </select>
            </div>
        </div>

        <!-- Category Filter -->
        <div class="mb-8 max-w-xs">
            <label class="block text-xs uppercase tracking-[1.5px] text-zinc-500 font-semibold mb-2 px-1">KATEGORI</label>
            <select id="category-select" 
                    class="w-full bg-zinc-900 border border-zinc-700 focus:border-rose-500 transition-colors rounded-3xl px-5 py-4 text-base outline-none">
            </select>
        </div>

        <!-- Video Grid -->
        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-3 xl:grid-cols-4 gap-5"></div>

        <!-- Pagination -->
        <div class="flex flex-col sm:flex-row items-center justify-between mt-10 gap-4 text-sm text-zinc-400">
            <div id="pagination-info"></div>
            <div class="flex gap-2 flex-wrap" id="pagination-controls"></div>
        </div>

    </div>

    <script>
        let videos = [];
        let activeCategory = 'all';
        let currentPage = 1;
        const perPage = 16;

        async function loadVideos() {
            try {
                const res = await fetch('videos.json');
                videos = await res.json();

                // Clean title
                videos.forEach(v => {
                    if (v.title) v.title = v.title.replace(/^[\u25B6\uFE0F\s]*/, '').trim();
                });

                document.getElementById('total').textContent = videos.length;
                setupCategoryDropdown();
                render();
            } catch(err) {
                document.getElementById('grid').innerHTML = `
                    <div class="col-span-full py-16 text-center">
                        <i class="fa-solid fa-exclamation-triangle text-4xl text-zinc-600 mb-4"></i>
                        <p class="text-zinc-400">Gagal memuat videos.json</p>
                    </div>
                `;
            }
        }

        function setupCategoryDropdown() {
            const select = document.getElementById('category-select');
            if (!select) return;

            select.innerHTML = '';

            const categories = [...new Set(videos.map(v => v.category).filter(Boolean))].sort();

            // All option
            const allOpt = document.createElement('option');
            allOpt.value = 'all';
            allOpt.textContent = 'Semua Kategori';
            select.appendChild(allOpt);

            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.textContent = cat;
                select.appendChild(opt);
            });

            select.addEventListener('change', () => {
                activeCategory = select.value;
                currentPage = 1;
                render();
            });
        }

        function render() {
            const grid = document.getElementById('grid');
            const searchTerm = document.getElementById('search').value.toLowerCase().trim();
            const sortMode = document.getElementById('sort').value;

            let filtered = videos.filter(v => {
                const matchSearch = !searchTerm || (v.title && v.title.toLowerCase().includes(searchTerm));
                const matchCat = activeCategory === 'all' || v.category === activeCategory;
                return matchSearch && matchCat;
            });

            // Sorting
            if (sortMode === 'newest') filtered.sort((a, b) => (b.id || 0) - (a.id || 0));
            else if (sortMode === 'oldest') filtered.sort((a, b) => (a.id || 0) - (b.id || 0));
            else if (sortMode === 'az') filtered.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
            else if (sortMode === 'za') filtered.sort((a, b) => (b.title || '').localeCompare(a.title || ''));

            const totalPages = Math.ceil(filtered.length / perPage);
            if (currentPage > totalPages) currentPage = totalPages || 1;

            const start = (currentPage - 1) * perPage;
            const pageVideos = filtered.slice(start, start + perPage);

            if (pageVideos.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-16 text-zinc-400">Tidak ada video ditemukan.</div>`;
                updatePagination(0, 0);
                return;
            }

            grid.innerHTML = pageVideos.map((v, i) => {
                const hasDirect = v.direct && v.direct.trim() !== '';
                const globalNum = start + i + 1;

                return `
                    <div class="video-card border border-zinc-700 rounded-3xl overflow-hidden flex flex-col">
                        
                        <!-- Header -->
                        <div class="px-4 pt-3.5 pb-2 flex items-center justify-between bg-zinc-900/70">
                            <span class="px-3.5 py-1 text-xs font-bold rounded-2xl bg-rose-600 text-white shadow-sm">
                                ${v.category || 'Umum'}
                            </span>
                            <span class="text-[10px] text-zinc-400 font-mono">#${globalNum}</span>
                        </div>

                        <!-- Inline Player -->
                        <div class="video-wrapper">
                            <iframe src="${v.embed}" loading="lazy" allowfullscreen></iframe>
                        </div>

                        <!-- Content -->
                        <div class="px-4 pt-4 pb-4 flex-1 flex flex-col">
                            <div class="text-[13.5px] font-semibold leading-tight line-clamp-2 flex-1">
                                ${v.title || 'Untitled Video'}
                            </div>
                            
                            <div class="flex items-center justify-between mt-4 pt-3 border-t border-zinc-700">
                                <span class="text-xs text-zinc-400 truncate">${v.source || 'IndoAV'}</span>
                                
                                <a href="${hasDirect ? v.direct : v.embed}" target="_blank"
                                   class="inline-flex items-center gap-x-2 text-xs px-4 py-2 bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 transition rounded-2xl font-semibold">
                                    <i class="fas fa-play text-xs"></i>
                                    <span>TONTON</span>
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            updatePagination(filtered.length, totalPages);
        }

        function updatePagination(total, totalPages) {
            const info = document.getElementById('pagination-info');
            const controls = document.getElementById('pagination-controls');
            
            info.innerHTML = `Menampilkan <span class="font-semibold text-white">${total}</span> video`;
            controls.innerHTML = '';

            if (totalPages <= 1) return;

            const createBtn = (page, active = false) => {
                const btn = document.createElement('button');
                btn.textContent = page;
                btn.className = `min-w-[42px] px-4 py-2 text-sm rounded-2xl border transition font-medium ${active 
                    ? 'bg-rose-600 border-rose-600 text-white' 
                    : 'border-zinc-700 hover:bg-zinc-800 hover:text-white'}`;
                btn.onclick = () => { currentPage = page; render(); };
                return btn;
            };

            // Prev
            const prev = document.createElement('button');
            prev.innerHTML = `<i class="fas fa-chevron-left"></i>`;
            prev.className = `px-4 py-2 rounded-2xl border flex items-center ${currentPage === 1 ? 'border-zinc-800 text-zinc-600 cursor-not-allowed' : 'border-zinc-700 hover:bg-zinc-800'}`;
            prev.onclick = () => { if (currentPage > 1) { currentPage--; render(); } };
            controls.appendChild(prev);

            // Page numbers
            const maxVisible = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
            let endPage = Math.min(totalPages, startPage + maxVisible - 1);
            if (endPage - startPage < maxVisible - 1) startPage = Math.max(1, endPage - maxVisible + 1);

            if (startPage > 1) {
                controls.appendChild(createBtn(1));
                if (startPage > 2) {
                    const el = document.createElement('span');
                    el.textContent = '...';
                    el.className = 'px-3 py-2 text-zinc-500';
                    controls.appendChild(el);
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                controls.appendChild(createBtn(i, i === currentPage));
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    const el = document.createElement('span');
                    el.textContent = '...';
                    el.className = 'px-3 py-2 text-zinc-500';
                    controls.appendChild(el);
                }
                controls.appendChild(createBtn(totalPages));
            }

            // Next
            const next = document.createElement('button');
            next.innerHTML = `<i class="fas fa-chevron-right"></i>`;
            next.className = `px-4 py-2 rounded-2xl border flex items-center ${currentPage === totalPages ? 'border-zinc-800 text-zinc-600 cursor-not-allowed' : 'border-zinc-700 hover:bg-zinc-800'}`;
            next.onclick = () => { if (currentPage < totalPages) { currentPage++; render(); } };
            controls.appendChild(next);
        }

        // Event Listeners
        document.getElementById('search').addEventListener('input', () => { currentPage = 1; render(); });
        document.getElementById('sort').addEventListener('change', () => { currentPage = 1; render(); });

        // Initialize
        loadVideos();
    </script>
</body>
</html>
